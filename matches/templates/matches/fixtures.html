{% extends "website/base.html" %}
{% block title %}Fixtures{% endblock %}

{% block content %}
<div class="mb-6">
    <h1 class="text-3xl font-bold text-white mb-1">Fixtures</h1>
    <p class="text-muted text-sm">Browse matches by matchday</p>
</div>

<div class="mb-6">
    {% include "website/components/matchday_tabs.html" %}
</div>

<div class="relative">
    <div id="fixture-loading" class="htmx-indicator pointer-events-none absolute inset-x-0 top-3 z-10 text-center">
        <span class="spinner text-accent"></span>
    </div>
    <div id="fixture-list">
        {% include "matches/partials/fixture_list.html" %}
    </div>
</div>
{% endblock %}
