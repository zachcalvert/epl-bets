{% load match_tags %}
{% if matches %}
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    {% for match in matches %}
        {% include "matches/partials/match_card.html" %}
    {% endfor %}
</div>
{% else %}
<div class="text-center py-16 text-muted">
    <p class="text-lg">No fixtures for matchday {{ matchday }}</p>
</div>
{% endif %}
