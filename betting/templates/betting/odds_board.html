{% extends "website/base.html" %}
{% load match_tags %}
{% block title %}Odds Board{% endblock %}

{% block content %}
<div class="mb-6">
    <h1 class="text-3xl font-bold text-white mb-1">Odds Board</h1>
    <p class="text-muted text-sm">Best available odds for upcoming matches</p>
</div>

<div class="overflow-x-auto" id="odds-board"
     hx-get="{% url 'betting:odds_partial' %}"
     hx-trigger="every 30s"
     hx-swap="innerHTML">
    {% include "betting/partials/odds_board_body.html" %}
</div>
{% endblock %}
