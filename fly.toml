app = "epl-bets"
primary_region = "sjc"

[build]

[deploy]
  release_command = "/release.sh"

[env]
  DEBUG = "False"
  PORT = "8000"
  ALLOWED_HOSTS = "eplbets.net,www.eplbets.net,epl-bets.fly.dev"
  CSRF_TRUSTED_ORIGINS = "https://eplbets.net,https://www.eplbets.net,https://epl-bets.fly.dev"
  CANONICAL_HOST = "eplbets.net"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "60s"
    method = "GET"
    path = "/healthz"
    [http_service.checks.headers]
      Host = "epl-bets.fly.dev"
      X-Forwarded-Proto = "https"

[processes]
  app = "daphne -b 0.0.0.0 -p 8000 --application-close-timeout 10 -t 60 config.asgi:application"
  worker = "celery -A config worker -l info"
  beat = "celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler"
