<nav class="bg-surface border-b border-gray-700">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
            <!-- Logo -->
            <div class="flex items-center">
                <a href="{% url 'matches:dashboard' %}" class="flex items-center gap-2">
                    <span class="text-accent text-2xl font-bold" style="font-family: 'Oswald', sans-serif;">PITCH & ODDS</span>
                </a>
            </div>

            <!-- Desktop nav -->
            <div class="hidden md:flex items-center gap-1">
                {% with url_name=request.resolver_match.url_name %}
                <a href="{% url 'matches:dashboard' %}"
                   class="px-3 py-2 rounded-md text-sm font-medium transition-colors
                          {% if url_name == 'dashboard' %}text-accent bg-accent/10{% else %}text-gray-300 hover:text-white hover:bg-dark{% endif %}">
                    Dashboard
                </a>
                <a href="{% url 'matches:fixtures' %}"
                   class="px-3 py-2 rounded-md text-sm font-medium transition-colors
                          {% if url_name == 'fixtures' %}text-accent bg-accent/10{% else %}text-gray-300 hover:text-white hover:bg-dark{% endif %}">
                    Fixtures
                </a>
                <a href="{% url 'matches:table' %}"
                   class="px-3 py-2 rounded-md text-sm font-medium transition-colors
                          {% if url_name == 'table' %}text-accent bg-accent/10{% else %}text-gray-300 hover:text-white hover:bg-dark{% endif %}">
                    Table
                </a>
                <a href="{% url 'betting:odds' %}"
                   class="px-3 py-2 rounded-md text-sm font-medium transition-colors
                          {% if url_name == 'odds' %}text-accent bg-accent/10{% else %}text-gray-300 hover:text-white hover:bg-dark{% endif %}">
                    Odds
                </a>
                {% endwith %}
            </div>

            <!-- Mobile menu button -->
            <div class="md:hidden">
                <button id="mobile-menu-btn" type="button"
                        class="text-gray-300 hover:text-white p-2"
                        onclick="document.getElementById('mobile-menu').classList.toggle('hidden')">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Mobile menu -->
    <div id="mobile-menu" class="hidden md:hidden border-t border-gray-700">
        <div class="px-2 pt-2 pb-3 space-y-1">
            {% with url_name=request.resolver_match.url_name %}
            <a href="{% url 'matches:dashboard' %}" class="block px-3 py-2 rounded-md text-base font-medium {% if url_name == 'dashboard' %}text-accent bg-accent/10{% else %}text-gray-300 hover:text-white hover:bg-dark{% endif %}">Dashboard</a>
            <a href="{% url 'matches:fixtures' %}" class="block px-3 py-2 rounded-md text-base font-medium {% if url_name == 'fixtures' %}text-accent bg-accent/10{% else %}text-gray-300 hover:text-white hover:bg-dark{% endif %}">Fixtures</a>
            <a href="{% url 'matches:table' %}" class="block px-3 py-2 rounded-md text-base font-medium {% if url_name == 'table' %}text-accent bg-accent/10{% else %}text-gray-300 hover:text-white hover:bg-dark{% endif %}">Table</a>
            <a href="{% url 'betting:odds' %}" class="block px-3 py-2 rounded-md text-base font-medium {% if url_name == 'odds' %}text-accent bg-accent/10{% else %}text-gray-300 hover:text-white hover:bg-dark{% endif %}">Odds</a>
            {% endwith %}
        </div>
    </div>
</nav>
