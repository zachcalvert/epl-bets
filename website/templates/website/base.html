{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pitch & Odds{% endblock %} | EPL Betting Demo</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        surface: '#16213e',
                        dark: '#1a1a2e',
                        accent: '#00e676',
                        danger: '#ff1744',
                        warning: '#ffab00',
                        muted: '#9e9e9e',
                        epl: '#38003c',
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-ws@2.0.2/ws.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Oswald', sans-serif; }
        .font-mono { font-family: 'Roboto Mono', 'Courier New', monospace; }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body class="h-full bg-dark text-gray-100">
    <div class="min-h-full flex flex-col">
        {% include "website/components/navbar.html" %}

        <main class="flex-1">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
                {% block content %}{% endblock %}
            </div>
        </main>

        {% include "website/components/footer.html" %}
    </div>

    {% block extra_js %}{% endblock %}
</body>
</html>
