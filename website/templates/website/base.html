{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EPL Bets{% endblock %}</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        surface: '#16213e',
                        dark: '#1a1a2e',
                        accent: '#00e676',
                        danger: '#ff1744',
                        warning: '#ffab00',
                        muted: '#9e9e9e',
                        epl: '#38003c',
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-ws@2.0.2/ws.js"></script>

    <!-- Custom styles -->
    <link rel="stylesheet" href="{% static 'website/css/styles.css' %}">

    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Oswald', sans-serif; }
        .font-mono { font-family: 'Roboto Mono', 'Courier New', monospace; }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body class="h-full bg-dark text-gray-100">
    <div class="min-h-full flex flex-col">
        {% include "website/components/navbar.html" %}

        <main class="flex-1">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
                {% block content %}{% endblock %}
            </div>
        </main>

        {% include "website/components/footer.html" %}
    </div>

    <!-- Notifications container for real-time toasts (bet settlements, etc.) -->
    <div id="notifications" class="fixed top-20 right-4 z-50 space-y-2 max-w-sm"></div>

    <!-- Global HTMX error handler -->
    <script>
        function showToast(message) {
            var container = document.getElementById('notifications');
            var toast = document.createElement('div');
            toast.className = 'bg-surface border border-gray-600 rounded-lg shadow-lg p-4 flex items-start gap-3 animate-slide-in';
            toast.setAttribute('role', 'alert');
            toast.innerHTML = '<svg class="w-5 h-5 text-danger flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/></svg>'
                + '<p class="text-sm text-white flex-1">' + message + '</p>'
                + '<button onclick="this.closest(\'[role=alert]\').remove()" class="text-muted hover:text-white flex-shrink-0"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button>';
            container.appendChild(toast);
            setTimeout(function() {
                toast.classList.add('animate-slide-out');
                toast.addEventListener('animationend', function() { toast.remove(); });
            }, 5000);
        }

        document.body.addEventListener('htmx:responseError', function(e) {
            showToast('Something went wrong. Please try again.');
        });
        document.body.addEventListener('htmx:sendError', function(e) {
            showToast('Network error. Check your connection.');
        });
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
