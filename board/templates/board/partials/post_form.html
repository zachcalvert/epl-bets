<form id="post-form"
      hx-post="{% url 'board:create_post' %}"
      hx-target="#post-list"
      hx-swap="afterbegin"
      hx-on::after-request="if(event.detail.successful) this.reset()"
      hx-disabled-elt="find button[type='submit']">
    {% csrf_token %}

    <!-- Post type selector -->
    <div class="flex gap-2 mb-3">
        {% for value, label in form.post_type.field.choices %}
        <label class="cursor-pointer">
            <input type="radio" name="post_type" value="{{ value }}"
                   {% if value == form.post_type.value or value == form.initial.post_type %}checked{% endif %}
                   class="hidden peer">
            <span class="inline-block px-3 py-1 rounded-full text-xs font-medium border transition-colors
                         peer-checked:bg-accent peer-checked:text-dark peer-checked:border-accent
                         border-gray-600 text-muted hover:border-gray-500">
                {{ label }}
            </span>
        </label>
        {% endfor %}
    </div>

    {{ form.body }}
    {% if form.body.errors %}
    <p class="text-red-400 text-xs mt-1">{{ form.body.errors.0 }}</p>
    {% endif %}
    <div class="flex justify-between items-center mt-2">
        <span class="text-xs text-muted">Max 2000 characters</span>
        <button type="submit"
                class="bg-accent text-dark font-bold py-1.5 px-4 rounded-md text-sm hover:bg-accent/90 transition-colors">
            <span class="htmx-indicator"><span class="spinner spinner-sm mr-1"></span></span>
            Post
        </button>
    </div>
</form>
